query getPersonalWave(
  $contentInput: PersonalWaveContentInput
  $first: PositiveInt! = 2
  $options: PersonalWaveOptions
  $waveInput: WaveInput
  $waveSrc: MagicSource
) {
  personalWaveContent(
    contentInput: $contentInput
    first: $first
    options: $options
    waveInput: $waveInput
    waveSrc: $waveSrc
  ) {
    id
    title
    lyrics
    hasFlac
    duration
    explicit
    availability
    artistTemplate
    childParam
    mark
    artists {
      id
      title
      image {
        src
        palette
      }
      mark
    }
    release {
      id
      title
      image {
        src
        palette
      }
    }
    zchan
  }
}

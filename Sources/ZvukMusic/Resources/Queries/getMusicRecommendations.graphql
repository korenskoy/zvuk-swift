query getMusicRecommendations($contentType: DynamicBlockContentType!, $itemType: [DynamicBlockItemType!], $pages: [Int!]!) {
  dynamicBlock(contentType: $contentType, itemType: $itemType, pages: $pages) {
    totalPages
    pages {
      page
      items {
        ... on Artist {
          __typename
          id
          title
          image {
            src
            palette
          }
          mark
        }
        ... on Release {
          __typename
          id
          title
          artists {
            id
            title
          }
          image {
            src
            palette
          }
          mark
        }
        ... on Playlist {
          __typename
          id
          title
          duration
          trackCount
          tracks(limit: 5) {
            ...PlayerTrackData
          }
        }
      }
    }
  }
}

fragment PlayerTrackData on Track {
  id
  title
  lyrics
  hasFlac
  duration
  explicit
  availability
  artistTemplate
  childParam
  mark
  artists {
    id
    title
    image {
      src
      palette
    }
    mark
  }
  release {
    id
    title
    image {
      src
      palette
    }
  }
  zchan
  __typename
}
